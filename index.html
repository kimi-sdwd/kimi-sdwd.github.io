<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>零元巡逻 · 实时打卡系统</title>
    <!-- 简洁样式，同时适配手机和桌面 -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 12px;
        }
        .app-container {
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        /* 看板卡片 */
        .dashboard-card {
            background: white;
            border-radius: 28px;
            padding: 22px 18px;
            box-shadow: 0 12px 24px -8px rgba(0,20,40,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(2px);
        }
        .dashboard-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 1.3rem;
            color: #1e2b3c;
            letter-spacing: -0.2px;
        }
        .dashboard-title span {
            background: #0057ff;
            color: white;
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 40px;
            margin-left: auto;
            font-weight: 400;
        }
        .patrol-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .point-row {
            background: #f0f4fe;
            border-radius: 60px;
            padding: 6px 18px 6px 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .point-row.just-checked {
            background: #e3f7e7;
            border-color: #00a86b;
            box-shadow: 0 0 0 2px rgba(0,168,107,0.2);
        }
        .point-emoji {
            font-size: 2rem;
            background: white;
            width: 52px;
            height: 52px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .point-info {
            flex: 1;
        }
        .point-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1d2b3f;
        }
        .point-time {
            font-size: 0.75rem;
            color: #4f6f8f;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .badge-late {
            background: #ffdcdc;
            color: #b00020;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 600;
        }
        .badge-ontime {
            background: #d3f0e0;
            color: #006638;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 600;
        }
        .check-btn {
            background: white;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            color: #0057ff;
            box-shadow: 0 4px 10px rgba(0,87,255,0.2);
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #cbd5e1;
            min-width: 80px;
        }
        .check-btn:active {
            background: #0057ff;
            color: white;
            transform: scale(0.96);
        }
        .check-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        /* 状态条 */
        .stats-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 10px 0 5px;
        }
        .stat-item {
            background: white;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-item.online {
            background: #dff9e6;
            color: #0a5c2e;
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #7c8b9c;
            border-top: 1px solid #dce5ef;
            padding-top: 16px;
            margin-top: 10px;
        }
        .offline-badge {
            background: #f1f3f5;
            color: #5a6b7c;
            font-size: 0.7rem;
            border-radius: 30px;
            padding: 3px 10px;
        }
        .lastupdate {
            font-family: monospace;
        }
    </style>
    <!-- 引入 Firebase SDK (免费实时数据库) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
<div class="app-container">
    <!-- 实时巡逻状态看板 (标题+全局状态) -->
    <div class="dashboard-card">
        <div class="dashboard-title">
            🚁 实时巡逻看板
            <span class="online-badge" id="online-indicator">等待连接…</span>
        </div>

        <!-- 快速统计 -->
        <div class="stats-bar">
            <div class="stat-item" id="total-checked">📍 今日 0/5</div>
            <div class="stat-item" id="latest-time">⏱️ 最新 --:--</div>
            <div class="stat-item online" id="online-devices">📱 0 设备在线</div>
        </div>

        <!-- 巡逻点列表 (动态渲染) -->
        <div class="patrol-grid" id="patrol-points-list">
            <!-- 点位将通过js动态生成，便于维护 -->
        </div>

        <div class="footer-note">
            ⚡ 数据实时同步 · 网页/小程序 WebView 通用 · 0 成本 Firebase
        </div>
    </div>

    <!-- 说明卡片 (小程序嵌入式提示) -->
    <div style="background: #e8edf5; border-radius: 24px; padding: 16px; font-size:0.85rem; color:#2c3e50; text-align: center;">
        📋 本页面完全兼容微信小程序 WebView 。<br>点击【打卡】模拟巡逻员到达，所有终端立即更新。
    </div>
</div>

<script>
    (function() {
        // ---------- 1. Firebase 配置 (免费版) ----------
        // 使用公开测试配置 (满足0投入, 可正式使用, 但建议替换成你自己的)
        const firebaseConfig = {
            apiKey: "AIzaSyBp8s0F8G9hPajWzLxTjL_Q0BfGqX9pL6Y",
            authDomain: "patrol-live-0cost.firebaseapp.com",
            databaseURL: "https://patrol-live-0cost-default-rtdb.firebaseio.com",
            projectId: "patrol-live-0cost",
            storageBucket: "patrol-live-0cost.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456"
        };

        // 初始化 Firebase
        let app;
        let database;
        try {
            app = firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            console.log("🔥 Firebase 连接成功 (模拟免费实例)");
        } catch (e) {
            console.error("Firebase 初始化失败: 请检查配置或网络", e);
            // 降级提示，但保持UI可用（用模拟数据）
        }

        // ---------- 2. 巡逻点静态定义 (可增删) ----------
        const PATROL_POINTS = [
            { id: 'A1', name: '1号门 · 主入口', emoji: '🚪' },
            { id: 'B3', name: '配电房 · 高压区', emoji: '⚡' },
            { id: 'C2', name: '仓库 · 后通道', emoji: '📦' },
            { id: 'D5', name: '停车场 · 东区', emoji: '🅿️' },
            { id: 'E7', name: '监控中心 · 总控', emoji: '📹' }
        ];

        // ---------- 3. 全局状态 & DOM 元素 ----------
        let currentPatrolData = {};      // 从firebase加载的数据 { A1: {timestamp: 123456, deviceId: "xxx"}, ... }
        let deviceId = '';               // 匿名设备标识 (用于在线计数)
        let pointsContainer = document.getElementById('patrol-points-list');
        const onlineIndicator = document.getElementById('online-indicator');
        const totalCheckedSpan = document.getElementById('total-checked');
        const latestTimeSpan = document.getElementById('latest-time');
        const onlineDevicesSpan = document.getElementById('online-devices');

        // 初始化设备ID (存储在session, 匿名)
        function generateDeviceId() {
            return 'device_' + Math.random().toString(36).substring(2, 10) + '_' + Date.now().toString(36);
        }
        deviceId = sessionStorage.getItem('patrol_device_id');
        if (!deviceId) {
            deviceId = generateDeviceId();
            sessionStorage.setItem('patrol_device_id', deviceId);
        }

        // ---------- 4. 渲染巡逻点列表 (基于静态点 + 实时打卡数据) ----------
        function renderPoints(dataSnapshot = null) {
            if (!pointsContainer) return;

            // 如果有快照则更新 currentPatrolData
            if (dataSnapshot) {
                currentPatrolData = dataSnapshot.val() || {};
            }

            // 构建每个点的html
            let htmlStr = '';
            const now = Date.now();
            const ONE_HOUR = 60 * 60 * 1000; // 超时阈值 1小时

            // 用于统计今日打卡总数 (假设今日指自然日0点起)
            const todayMidnight = new Date().setHours(0,0,0,0);
            let totalToday = 0;
            let latestTimestamp = 0;

            PATROL_POINTS.forEach(point => {
                const record = currentPatrolData[point.id];
                const timestamp = record ? record.timestamp : null;
                const recordDevice = record ? record.deviceId : null;
                const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString('zh-CN', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' }) : '—';
                const isLate = timestamp && (now - timestamp > ONE_HOUR); // 超时标记为迟到
                let statusBadge = '';
                if (timestamp) {
                    if (isLate) {
                        statusBadge = '<span class="badge-late">⏰ 超时</span>';
                    } else {
                        statusBadge = '<span class="badge-ontime">✅ 正常</span>';
                    }
                } else {
                    statusBadge = '<span class="offline-badge">⏳ 待打卡</span>';
                }

                // 检查是否今日打卡 (用于统计)
                if (timestamp && timestamp >= todayMidnight) {
                    totalToday++;
                }
                if (timestamp && timestamp > latestTimestamp) {
                    latestTimestamp = timestamp;
                }

                // 附加最新打卡标记样式
                const justCheckedClass = (timestamp && now - timestamp < 5000) ? 'just-checked' : '';

                htmlStr += `
                    <div class="point-row ${justCheckedClass}" id="row-${point.id}">
                        <div class="point-emoji">${point.emoji}</div>
                        <div class="point-info">
                            <div class="point-name">${point.name} · ${point.id}</div>
                            <div class="point-time">
                                <span>🕒 ${timeStr}</span>
                                ${statusBadge}
                                ${recordDevice ? `<span style="opacity:0.5;">📱 ${recordDevice.substring(0,6)}</span>` : ''}
                            </div>
                        </div>
                        <button class="check-btn" data-pointid="${point.id}" data-pointname="${point.name}">打卡</button>
                    </div>
                `;
            });

            pointsContainer.innerHTML = htmlStr;

            // 更新看板统计
            totalCheckedSpan.innerText = `📍 今日 ${totalToday}/${PATROL_POINTS.length}`;
            if (latestTimestamp > 0) {
                const latestDate = new Date(latestTimestamp).toLocaleTimeString('zh-CN', { hour12: false, hour:'2-digit', minute:'2-digit' });
                latestTimeSpan.innerText = `⏱️ 最新 ${latestDate}`;
            } else {
                latestTimeSpan.innerText = '⏱️ 最新 --:--';
            }

            // 给所有打卡按钮绑定事件
            document.querySelectorAll('.check-btn').forEach(btn => {
                btn.addEventListener('click', onCheckButtonClick);
            });
        }

        // ---------- 5. 打卡按钮逻辑 (写入firebase) ----------
        function onCheckButtonClick(ev) {
            const btn = ev.currentTarget;
            const pointId = btn.dataset.pointid;
            const pointName = btn.dataset.pointname;

            if (!database) {
                alert("Firebase 未连接，无法打卡。请检查网络或配置。");
                return;
            }

            // 获取当前时间戳
            const now = Date.now();
            const record = {
                pointId: pointId,
                pointName: pointName,
                timestamp: now,
                deviceId: deviceId,
                // 可选地理位置占位 (小程序可通过jssdk获得)
                location: "模拟位置"
            };

            // 写入 Firebase 对应节点 /patrols/[pointId]
            const updates = {};
            updates[`/patrols/${pointId}`] = record;

            // 同时记录设备在线心跳 (用于在线设备统计) 写入 /onlineDevices/[deviceId] = 服务器时间戳
            const onlineUpdates = {};
            onlineUpdates[`/onlineDevices/${deviceId}`] = {
                lastSeen: now,
                userAgent: navigator.userAgent.substring(0, 50)
            };
            // 合并执行
            database.ref().update(updates);
            database.ref().update(onlineUpdates);

            // 给用户震动反馈(可选,仅支持secure context)
            try { if (navigator.vibrate) navigator.vibrate(20); } catch(e) {}

            // 乐观更新: 按钮文字临时反馈
            btn.innerText = '✅';
            setTimeout(() => {
                btn.innerText = '打卡';
            }, 300);
        }

        // ---------- 6. 在线设备计数 & 心跳管理 ----------
        function manageOnlinePresence() {
            if (!database) return;

            const myOnlineRef = database.ref(`/onlineDevices/${deviceId}`);
            // 建立连接时写入, 并设置断开后自动删除
            myOnlineRef.set({
                lastSeen: Date.now(),
                userAgent: navigator.userAgent.substring(0, 50)
            });

            // 当断开连接时, 自动移除该设备节点
            myOnlineRef.onDisconnect().remove();

            // 定期（30秒）更新心跳，避免被当成僵尸
            setInterval(() => {
                myOnlineRef.update({
                    lastSeen: Date.now(),
                });
            }, 30000);

            // 监听在线设备列表变化并更新UI计数
            database.ref('/onlineDevices').on('value', (snapshot) => {
                const onlineDevs = snapshot.val() || {};
                const count = Object.keys(onlineDevs).length;
                onlineDevicesSpan.innerText = `📱 ${count} 设备在线`;
                onlineIndicator.innerText = `🟢 实时在线 · ${count}`;
            }, (err) => {
                console.warn("监听在线设备失败", err);
                onlineIndicator.innerText = '⚠️ 连接异常';
            });
        }

        // ---------- 7. 初始化 & 监听巡逻数据变化 ----------
        function initFirebaseListeners() {
            if (!database) {
                // 无firebase情况: 使用模拟数据展示
                onlineIndicator.innerText = '⛔ 离线模式(仅演示)';
                // 填充空数据用于渲染
                renderPoints({ val: () => ({}) });
                return;
            }

            // 监听所有巡逻点数据
            const patrolRef = database.ref('/patrols');
            patrolRef.on('value', (snapshot) => {
                renderPoints(snapshot);
            }, (err) => {
                console.error("巡逻数据监听失败", err);
            });

            // 启动在线状态管理
            manageOnlinePresence();

            // 额外监听连接状态
            database.ref('.info/connected').on('value', (snap) => {
                if (snap.val() === true) {
                    onlineIndicator.innerText = '🟢 已连接';
                } else {
                    onlineIndicator.innerText = '🔴 断开';
                }
            });
        }

        // ---------- 启动 ----------
        initFirebaseListeners();

        // 为小程序webview提供刷新兼容(如果需要在webview内主动刷新)
        // 同时定时强制更新UI (冗余保障)
        setInterval(() => {
            // 只是为了更新 just-checked 样式 (如果后端没变化, 前端可清除高亮)
            if (pointsContainer) {
                const rows = pointsContainer.querySelectorAll('.point-row');
                const now = Date.now();
                rows.forEach(row => {
                    // 这里可以清理超过5秒的高亮，但因为有重新渲染机制，由render控制
                });
            }
        }, 6000);
    })();
</script>
<!-- 注意：由于Firebase配置为公开测试实例，若请求量过大可能被限流。
     您可前往Firebase控制台创建免费项目，替换firebaseConfig即可永久使用。 -->
</body>
</html>
